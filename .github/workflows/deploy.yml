name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to staging (dev.joinharbor.app)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        run: |
          rsync -az --delete \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=dist \
            --exclude=.git \
            --exclude=.DS_Store \
            --exclude=.env \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/ed/harbor/

      - name: Build and restart
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'cd /home/ed/harbor && docker compose build && docker rm -f harbor-api 2>/dev/null || true && doppler run -- docker compose up -d api'

      - name: Run migrations
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'cd /home/ed/harbor && doppler run -- docker compose exec -T api node dist/db/migrate.js'

      - name: Verify deployment
        run: |
          sleep 20
          curl -sf https://api.dev.joinharbor.app/health
          curl -sf -o /dev/null -w "Web: HTTP %{http_code}\n" https://dev.joinharbor.app
