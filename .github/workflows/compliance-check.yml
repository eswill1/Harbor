name: Compliance Check

on:
  pull_request:
    branches: [main]

jobs:
  compliance:
    name: Compliance Checklist Gate
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR template checklist
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            // Count unchecked items: - [ ] (open checkbox, not yet resolved)
            // - [x] = passes / confirmed not violated
            // - [N/A] = not applicable to this PR (conditional items)
            // Both [x] and [N/A] are acceptable; only [ ] blocks merge.
            const unchecked = (body.match(/- \[ \]/g) || []).length;
            const checked   = (body.match(/- \[x\]/gi) || []).length;
            const na        = (body.match(/- \[N\/A\]/gi) || []).length;

            if (unchecked > 0) {
              core.setFailed(
                `Compliance checklist incomplete: ${unchecked} item(s) still unchecked. ` +
                `Mark each item [x] (confirmed) or [N/A] (not applicable) before merge.`
              );
            } else if (checked + na === 0) {
              core.setFailed(
                'PR body appears to be missing the compliance checklist. ' +
                'Use the Pull Request template.'
              );
            } else {
              console.log(`Compliance checklist complete: ${checked} confirmed, ${na} N/A.`);
            }
